site_name: OSGeo Nepal
site_description: OSGeo Nepal is group of geospatial developers from Nepal

docs_dir: "docs"
site_dir: "build"

#header
repo_name: "osegonepal/site"
repo_url: "https://github.com/osgeonepal/site/"
site_url: "https://osgeonepal.github.io/site/"

#Footer
extra:
  social:
    - icon: "fontawesome/brands/github"
      link: "https://github.com/osgeonepal"
    - icon: "fontawesome/brands/twitter"
      link: "https://twitter.com/osgeonepal"
    - icon: "fontawesome/brands/facebook"
      link: "https://facebook.com/osgeonepal"
    - icon: "fontawesome/brands/linkedin"
      link: "https://www.linkedin.com/company/osgeonepal"
    - icon: "fontawesome/brands/mastodon"
      link: "https://mastodon.social/@osgeonepal"
      
  copyright: Copyright &copy; 2023 OSGEONEPAL
  generator: false
#Navigation
nav:
  - Home: index.md
  - Objectives: objectives.md
  - ...
  - Contact Us: contact.md 

plugins:
  - search
  - awesome-pages
  - mkdocs-jupyter #for jupyter notebook support
  - neoteroi.mkdocsoad: # openapi docs
      use_pymdownx: true

extra_css:
  - css/mkdocsoad.css

#customization
theme:
  name: material
  logo: assets/favicon.png
  favicon: assets/favicon.png

  #internalization
  language: en
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      primary: green
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - attr_list
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true
      title: Page contents
  - admonition
  - pymdownx.highlight
  - pymdownx.extra
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji: #for emoji support e.g checkmarks
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
